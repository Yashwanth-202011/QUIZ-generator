{% extends 'quizapp/base.html' %}

{% block content %}
    <h1><span class="gradient-text">Video Summary</span> & Quiz Setup</h1>
    
    <div class="glass-card process-container">
        <h2>{{ metadata.title }}</h2>
        <div class="video-player-wrapper" style="margin-top: 1.5rem;">
            <iframe 
                width="100%" 
                height="100%" 
                src="https://www.youtube.com/embed/{{ metadata.video_id }}" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        
        <div class="action-row">
            <div class="status-indicator">
                <div class="pulse" id="status-pulse" style="display: none;"></div>
                <span id="status-text">Ready to generate quiz</span>
            </div>
            <button class="btn-primary" id="generate-quiz-btn" onclick="startQuizGeneration('{{ url|escapejs }}', '{{ metadata.video_id|escapejs }}', '{{ metadata.title|escapejs }}')">
                <span class="btn-text">Generate Quiz with AI ✨</span>
                <div class="spinner"></div>
            </button>
        </div>
        
        <div class="progress-bar-container" id="generation-progress-container" style="display: none; margin-top: 2rem;">
            <div class="progress-bar" id="generation-progress" style="width: 0%;"></div>
            <p style="text-align: center; margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.875rem;" id="progress-detail">Initializing...</p>
        </div>
    </div>
{% endblock %}
